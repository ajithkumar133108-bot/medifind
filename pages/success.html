<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>MediFind – Payment Successful</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0f172a;
      color: #f8fafc;
      text-align: center;
    }
    .success-card {
      background: #1e293b;
      padding: 3rem;
      border-radius: 16px;
      max-width: 450px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .success-icon {
      font-size: 5rem;
      margin-bottom: 1rem;
    }
    .success-card h2 {
      color: #10b981;
      margin-bottom: 1rem;
    }
    .success-card p {
      color: #cbd5e1;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .btn.bg {
      width: 100%;
      padding: 1rem;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="success-icon">✅</div>
    <h2>Payment Successful</h2>
    <p>Your order has been placed and payment has been processed securely. You can track your orders in your dashboard.</p>
    <button class="btn bg" onclick="window.location.href='user.html'">Back to Dashboard</button>
  </div>
</body>
</html>
