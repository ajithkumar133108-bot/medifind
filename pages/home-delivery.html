<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>MediFind – Home Delivery</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAQj1ADl5hsR6eLlEWh2rYDIJcCkTI-x4k"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Outfit',sans-serif;background:#060d1a;color:#f8fafc;min-height:100vh;padding:1.2rem;display:flex;align-items:center;justify-content:center}
    .wrap{width:100%;max-width:980px;display:grid;grid-template-columns:380px 1fr;gap:1rem}
    .card{background:linear-gradient(145deg,#0f1e35,#0a1628);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:1.2rem;box-shadow:0 20px 55px rgba(0,0,0,.55)}
    .title{font-size:1.3rem;font-weight:800;margin-bottom:.25rem}
    .sub{color:#94a3b8;font-size:.9rem;margin-bottom:1rem;line-height:1.5}
    .sec{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:.9rem;margin-bottom:.8rem}
    .lbl{color:#94a3b8;font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.35rem}
    .val{color:#e2e8f0;font-size:.92rem;line-height:1.45}
    .status{display:flex;align-items:center;justify-content:space-between;gap:.8rem}
    .pill{padding:.35rem .7rem;border-radius:999px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.28);color:#6ee7b7;font-weight:700;font-size:.8rem}
    .muted{color:#94a3b8;font-size:.85rem}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:.6rem}
    .btn{border:none;border-radius:12px;padding:.8rem;font-weight:800;font-family:'Outfit',sans-serif;cursor:pointer}
    .btn.pri{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
    .btn.sec{background:transparent;border:1px solid rgba(255,255,255,.15);color:#cbd5e1}
    #map{height:520px;border-radius:18px;overflow:hidden}
    .legend{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;margin-top:.55rem}
    .dot{width:10px;height:10px;border-radius:50%}
    .dot.agent{background:#22c55e}
    .dot.user{background:#3b82f6}
    .kv{display:flex;justify-content:space-between;gap:.8rem;margin-top:.4rem;color:#cbd5e1;font-size:.86rem}
    .kv span{color:#94a3b8}
    .toggle{display:flex;align-items:center;gap:.55rem;margin-top:.6rem;color:#cbd5e1;font-size:.86rem}
    .toggle input{width:16px;height:16px}
    @media (max-width: 900px){
      .wrap{grid-template-columns:1fr}
      #map{height:420px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">🏠 Home Delivery</div>
      <div class="sub">Your order is being delivered to your address. Live agent location updates every 5 seconds.</div>

      <div class="sec">
        <div class="lbl">Order IDs</div>
        <div class="val" id="orderIds">—</div>
      </div>

      <div class="sec">
        <div class="lbl">Delivery Address</div>
        <div class="val" id="deliveryAddress">—</div>
      </div>

      <div class="sec">
        <div class="lbl">Selected Pharmacy</div>
        <div class="val" id="pharmacyText">—</div>
        <div class="legend">
          <span class="pill" style="background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.28);color:#86efac"><span class="dot agent"></span> Agent</span>
          <span class="pill" style="background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.28);color:#93c5fd"><span class="dot user"></span> You</span>
        </div>
        <div class="toggle">
          <input id="followToggle" type="checkbox" checked />
          <label for="followToggle" style="margin:0;font-size:.86rem;color:#cbd5e1">Follow agent</label>
        </div>
        <div class="kv"><span>Last update</span><b id="lastUpdate">—</b></div>
        <div class="kv"><span>Distance (est.)</span><b id="distanceTxt">—</b></div>
      </div>

      <div class="sec">
        <div class="status">
          <div>
            <div class="lbl">Delivery Status</div>
            <div class="val" id="statusText">Waiting for payment confirmation…</div>
          </div>
          <div class="pill" id="statusPill">—</div>
        </div>
        <div class="muted" style="margin-top:.55rem" id="hint">Complete payment to start tracking.</div>
        <div class="btns" style="margin-top:.8rem">
          <button class="btn pri" id="confirmReceivedBtn" onclick="confirmReceived()" style="display:none">Medicine Received</button>
        </div>
      </div>

      <div class="btns">
        <button class="btn sec" onclick="window.location.href='user.html'">← Dashboard</button>
        <button class="btn pri" onclick="window.location.href='tracking.html'">Map Tracking →</button>
      </div>
    </div>

    <div class="card" style="padding:0">
      <div id="map"></div>
    </div>
  </div>

  <script>
    let map, userMarker, agentMarker, pollTimer;
    let routeLine = null;
    let lastAgentPos = null;
    let lastUiUpdateAt = 0;
    let currentOrderIds = "";

    function loadUserLocation() {
      try {
        const saved = localStorage.getItem("mf_user_location");
        if (!saved) return null;
        const loc = JSON.parse(saved);
        if (!loc || !loc.lat || !loc.lng) return null;
        return { lat: +loc.lat, lng: +loc.lng };
      } catch {
        return null;
      }
    }

    function initMap() {
      const userLoc = loadUserLocation() || { lat: 13.0827, lng: 80.2707 };
      map = new google.maps.Map(document.getElementById("map"), {
        zoom: 14,
        center: userLoc,
        disableDefaultUI: true,
        zoomControl: true
      });

      userMarker = new google.maps.Marker({
        position: userLoc,
        map,
        title: "Delivery Address",
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 8,
          fillColor: "#4285F4",
          fillOpacity: 1,
          strokeWeight: 2,
          strokeColor: "#fff"
        }
      });
    }

    function haversineKm(a, b) {
      if (!a || !b) return null;
      const R = 6371;
      const dLat = (b.lat - a.lat) * Math.PI / 180;
      const dLng = (b.lng - a.lng) * Math.PI / 180;
      const lat1 = a.lat * Math.PI / 180;
      const lat2 = b.lat * Math.PI / 180;
      const s1 = Math.sin(dLat / 2);
      const s2 = Math.sin(dLng / 2);
      const h = s1 * s1 + Math.cos(lat1) * Math.cos(lat2) * s2 * s2;
      return 2 * R * Math.asin(Math.min(1, Math.sqrt(h)));
    }

    function setLastUpdate(ts) {
      const el = document.getElementById("lastUpdate");
      if (!el) return;
      if (!ts) { el.textContent = "—"; return; }
      const sec = Math.max(0, Math.round((Date.now() - ts) / 1000));
      el.textContent = sec <= 1 ? "now" : `${sec}s ago`;
    }

    function isFollowOn() {
      const cb = document.getElementById("followToggle");
      return cb ? !!cb.checked : true;
    }

    function ensureInView(pos) {
      if (!map || !pos) return;
      if (!isFollowOn()) return;
      const bounds = map.getBounds();
      if (!bounds) { map.setCenter(pos); return; }
      if (!bounds.contains(new google.maps.LatLng(pos.lat, pos.lng))) {
        map.panTo(pos);
      }
    }

    function updateRouteLine(agentPos, userPos) {
      if (!agentPos || !userPos) return;
      const path = [agentPos, userPos];
      if (!routeLine) {
        routeLine = new google.maps.Polyline({
          path,
          geodesic: true,
          strokeColor: "#22c55e",
          strokeOpacity: 0.9,
          strokeWeight: 4,
          map
        });
      } else {
        routeLine.setPath(path);
      }
      const km = haversineKm(agentPos, userPos);
      const distanceTxt = document.getElementById("distanceTxt");
      if (distanceTxt) {
        distanceTxt.textContent = km == null ? "—" : (km < 1 ? `${Math.round(km * 1000)} m` : `${km.toFixed(2)} km`);
      }
    }

    function animateMarkerTo(marker, fromPos, toPos, durationMs = 450) {
      if (!marker || !fromPos || !toPos) return;
      const start = performance.now();
      function step(now) {
        const t = Math.min(1, (now - start) / durationMs);
        const lat = fromPos.lat + (toPos.lat - fromPos.lat) * t;
        const lng = fromPos.lng + (toPos.lng - fromPos.lng) * t;
        marker.setPosition({ lat, lng });
        if (t < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function setStatus(text) {
      document.getElementById("statusText").textContent = text;
      document.getElementById("statusPill").textContent = text;
    }

    async function pollTracking(orderIds) {
      try {
        let data = null;
        const primaryOrderId = String(orderIds).split(",")[0].trim();
        // Prefer simple DB-first endpoint for the primary order.
        if (primaryOrderId) {
          const r1 = await fetch(`/track/${encodeURIComponent(primaryOrderId)}`);
          data = await r1.json();
          if (data && data.success) {
            data = { ...data, status: data.status, agent: { lat: data.lat, lng: data.lng } };
          }
        }
        // Fallback for multi-order ids / older flows.
        if (!data || !data.success) {
          const res = await fetch(`/api/tracking?orderIds=${encodeURIComponent(orderIds)}`);
          data = await res.json();
        }
        if (!data || !data.success) return;
        setStatus(data.status || "Assigned");
        const confirmBtn = document.getElementById("confirmReceivedBtn");
        if (data.status === "Delivered" && !data.receivedByUser) {
          confirmBtn.style.display = "block";
        } else {
          confirmBtn.style.display = "none";
        }
        if (data.receivedByUser) {
          document.getElementById("hint").textContent = "You confirmed medicine received. Pharmacy has been notified.";
        }

        const pos = data.agent && data.agent.lat != null
          ? { lat: +data.agent.lat, lng: +data.agent.lng }
          : (data.lat != null && data.lng != null ? { lat: +data.lat, lng: +data.lng } : null);
        if (!pos) return;
        if (!agentMarker) {
          agentMarker = new google.maps.Marker({
            position: pos,
            map,
            title: "Delivery Agent",
            icon: "https://maps.google.com/mapfiles/ms/icons/green-dot.png"
          });
        } else {
          if (lastAgentPos) {
            animateMarkerTo(agentMarker, lastAgentPos, pos);
          } else {
            agentMarker.setPosition(pos);
          }
        }
        ensureInView(pos);
        lastAgentPos = pos;
        updateRouteLine(pos, loadUserLocation());
        lastUiUpdateAt = Date.now();
        setLastUpdate(lastUiUpdateAt);
        if (data.status === "Delivered" && pollTimer) clearInterval(pollTimer);
      } catch {}
    }

    async function confirmReceived() {
      if (!currentOrderIds) return;
      try {
        const res = await fetch('/api/tracking/confirm-received', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderIds: currentOrderIds })
        });
        const data = await res.json();
        if (data && data.success) {
          document.getElementById("confirmReceivedBtn").style.display = "none";
          document.getElementById("hint").textContent = data.message || "Medicine received confirmed.";
          await pollTracking(currentOrderIds);
        }
      } catch {}
    }

    (function init() {
      document.getElementById("orderIds").textContent = localStorage.getItem("currentOrderIds") || "—";
      document.getElementById("deliveryAddress").textContent = localStorage.getItem("mf_delivery_address") || "—";
      const pharmacy = JSON.parse(localStorage.getItem("selectedPharmacy") || "null");
      document.getElementById("pharmacyText").textContent = pharmacy ? (pharmacy.name || "—") : "—";

      initMap();

      currentOrderIds = localStorage.getItem("currentOrderIds") || "";
      if (currentOrderIds) {
        document.getElementById("hint").textContent = "Tracking is live.";
        setLastUpdate(null);
        pollTracking(currentOrderIds);
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(() => pollTracking(currentOrderIds), 3000);
      } else {
        setStatus("Payment not confirmed");
      }
    })();
  </script>
</body>
</html>
