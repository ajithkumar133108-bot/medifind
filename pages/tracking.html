<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>MediFind - Live Tracking</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAQj1ADl5hsR6eLlEWh2rYDIJcCkTI-x4k"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Outfit',sans-serif;background:#060d1a;color:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
    .card{width:100%;max-width:460px;background:linear-gradient(145deg,#0f1e35,#0a1628);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:1.4rem}
    .title{font-size:1.3rem;font-weight:800;margin-bottom:.3rem}
    .sub{color:#94a3b8;font-size:.9rem;margin-bottom:1rem}
    .pharmacy{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:.8rem;margin-bottom:1rem}
    .pharmacy b{display:block;margin-bottom:.2rem}
    .status{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:12px;padding:1rem;text-align:center}
    .status .lbl{font-size:.78rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em}
    .status .txt{font-size:1.25rem;font-weight:700;color:#34d399;margin-top:.3rem}
    .meta{margin-top:1rem;color:#94a3b8;font-size:.85rem}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:1rem}
    .btn{padding:.8rem;border-radius:10px;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:700}
    .btn.pri{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
    .btn.sec{background:transparent;border:1px solid rgba(255,255,255,.15);color:#cbd5e1}
    .confirm-wrap{margin-top:.8rem}
    #map{height:250px;border-radius:12px;border:1px solid rgba(255,255,255,.12);margin-top:1rem}
  </style>
</head>
<body>
  <div class="card">
    <div class="title">MediFind 🏥 Live Tracking</div>
    <div class="sub">Track your medicine order in real time.</div>

    <div class="pharmacy" id="pharmacyBox">
      <b>Selected Pharmacy</b>
      <span id="pharmacyTxt">Not available</span>
    </div>

    <div class="status">
      <div class="lbl">Delivery Status</div>
      <div class="txt" id="statusText">Waiting for payment confirmation...</div>
    </div>
    <div class="confirm-wrap">
      <button class="btn pri" id="confirmReceivedBtn" onclick="confirmReceived()" style="display:none;width:100%">Medicine Received</button>
    </div>

    <div class="meta" id="orderMeta"></div>
    <div id="map"></div>

    <div class="actions">
      <button class="btn sec" onclick="window.location.href='user.html'">Dashboard</button>
      <button class="btn pri" onclick="window.location.href='success.html'">Order Summary</button>
    </div>
  </div>

  <script>
    let pollTimer = null;
    let currentOrderIds = "";
    let map = null;
    let agentMarker = null;

    function initMap() {
      if (map) return;
      map = new google.maps.Map(document.getElementById("map"), {
        zoom: 13,
        center: { lat: 13.0827, lng: 80.2707 },
        disableDefaultUI: true,
        zoomControl: true
      });
    }

    function updateAgentMarker(lat, lng) {
      if (lat == null || lng == null) return;
      initMap();
      const pos = { lat: +lat, lng: +lng };
      if (!agentMarker) {
        agentMarker = new google.maps.Marker({
          position: pos,
          map,
          title: "Delivery Agent",
          icon: "https://maps.google.com/mapfiles/ms/icons/green-dot.png"
        });
      } else {
        agentMarker.setPosition(pos);
      }
      map.setCenter(pos);
    }

    async function pollTracking(orderIds) {
      try {
        const res = await fetch(`/api/tracking?orderIds=${encodeURIComponent(orderIds)}`);
        const data = await res.json();
        if (!data || !data.success) return;
        document.getElementById("statusText").textContent = data.status || "Assigned";
        if (data.agent && data.agent.lat != null && data.agent.lng != null) {
          updateAgentMarker(data.agent.lat, data.agent.lng);
        }
        const confirmBtn = document.getElementById("confirmReceivedBtn");
        if (data.status === "Delivered" && !data.receivedByUser) {
          confirmBtn.style.display = "block";
        } else {
          confirmBtn.style.display = "none";
        }
        if (data.receivedByUser) {
          document.getElementById("orderMeta").textContent = `Order IDs: ${orderIds} | Medicine received confirmed. Pharmacy notified.`;
        }
        if (data.status === "Delivered" && pollTimer) clearInterval(pollTimer);
      } catch {}
    }

    async function confirmReceived() {
      if (!currentOrderIds) return;
      try {
        const res = await fetch('/api/tracking/confirm-received', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderIds: currentOrderIds })
        });
        const data = await res.json();
        if (data && data.success) {
          document.getElementById("confirmReceivedBtn").style.display = "none";
          document.getElementById("orderMeta").textContent = `Order IDs: ${currentOrderIds} | ${data.message}`;
          await pollTracking(currentOrderIds);
        }
      } catch {}
    }

    (function initTracking() {
      initMap();
      const orderIds = localStorage.getItem("currentOrderIds") || "N/A";
      currentOrderIds = orderIds;
      const selectedPharmacy = JSON.parse(localStorage.getItem("selectedPharmacy") || "null");
      const pharmacyTxt = selectedPharmacy
        ? `${selectedPharmacy.name}${selectedPharmacy.address ? " - " + selectedPharmacy.address : ""}`
        : "Not available";
      document.getElementById("pharmacyTxt").textContent = pharmacyTxt;
      document.getElementById("orderMeta").textContent = `Order IDs: ${orderIds}`;

      if (!orderIds || orderIds === "N/A") {
        document.getElementById("statusText").textContent = "No order found.";
        return;
      }
      pollTracking(orderIds);
      pollTimer = setInterval(() => pollTracking(orderIds), 3000);
    })();
  </script>
</body>
</html>
