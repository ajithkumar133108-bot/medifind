services:
  - type: web
    name: medifind
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        value: roundhouse.proxy.rlwy.net
      - key: DB_PORT
        value: 29018
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_NAME
        value: railway
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000
